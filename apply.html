<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apply — Robotics Trainer · Octobrain</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #F4F7F8;
    --panel: #FFFFFF;
    --navy: #12213E;
    --navy-soft: #3B4A6B;
    --teal: #00B3A4;
    --orange: #FF6B35;
    --line: #DDE3E8;
    --radius: 14px;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:var(--bg); color:var(--navy);
    font-family:'Inter', sans-serif; line-height:1.5;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  h1,h2{ font-family:'Space Grotesk', sans-serif; }
  .mono{ font-family:'JetBrains Mono', monospace; }
  a{color:inherit;}

  .wrap{ max-width:640px; margin:0 auto; padding:0 24px; }

  .nav{
    display:flex; align-items:center; justify-content:space-between;
    padding:22px 24px; max-width:640px; margin:0 auto;
  }
  .brand{ display:flex; align-items:center; gap:10px; font-weight:600; font-size:1.05rem; }
  .brand .dot{ width:10px; height:10px; border-radius:50%; background:var(--orange); box-shadow:0 0 0 4px rgba(255,107,53,0.15); }
  .back-link{
    font-size:0.85rem; font-weight:600; text-decoration:none;
    color:var(--navy-soft); display:flex; align-items:center; gap:6px;
  }

  .form-header{ padding:24px 0 8px; }
  .role-badge{
    display:inline-flex; align-items:center; gap:10px;
    background:rgba(255,107,53,0.08);
    border:1.5px solid var(--orange);
    color:var(--navy); font-size:0.85rem;
    padding:8px 14px; border-radius:10px; margin-bottom:18px;
  }
  .role-badge strong{ color:var(--orange); font-family:'Space Grotesk', sans-serif; }
  .role-dot{ width:8px; height:8px; border-radius:50%; background:var(--orange); flex-shrink:0; box-shadow:0 0 0 4px rgba(255,107,53,0.15); }
  .form-header h1{ font-size:1.9rem; margin-bottom:10px; }
  .form-header p{ color:var(--navy-soft); font-size:1rem; max-width:48ch; }

  form{
    background:var(--panel); border:1px solid var(--line);
    border-radius:var(--radius); padding:32px;
    margin:28px 0 60px;
  }
  .field{ margin-bottom:22px; }
  .field:last-of-type{ margin-bottom:0; }
  label{
    display:block; font-size:0.85rem; font-weight:600;
    margin-bottom:8px; color:var(--navy);
  }
  label .opt{
    font-family:'JetBrains Mono', monospace; font-weight:400;
    font-size:0.75rem; color:var(--navy-soft); text-transform:none;
  }
  input[type=text], input[type=url], select, textarea{
    width:100%; padding:12px 14px; border-radius:10px;
    border:1.5px solid var(--line); background:var(--bg);
    font-family:'Inter', sans-serif; font-size:0.95rem; color:var(--navy);
    outline:none; transition:border-color 0.15s ease;
  }
  input:focus, select:focus, textarea:focus{ border-color:var(--teal); }
  textarea{ resize:vertical; min-height:90px; }

  /* --- METHOD SELECTION BUTTONS --- */
  .method-selector {
    display: flex;
    gap: 12px;
    margin-bottom: 14px;
  }
  .method-btn {
    flex: 1;
    padding: 11px 14px;
    border: 1.5px solid var(--line);
    background: var(--panel);
    border-radius: 10px;
    font-size: 0.88rem;
    font-weight: 600;
    color: var(--navy-soft);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: all 0.15s ease;
  }
  .method-btn:hover {
    border-color: var(--navy-soft);
  }
  .method-btn.active {
    border-color: var(--teal);
    color: var(--navy);
    background: rgba(0, 179, 164, 0.04);
  }

  /* --- BEAUTIFUL FILE UPLOAD DROPZONE --- */
  .file-dropzone {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 26px;
    border: 2px dashed var(--line);
    border-radius: 10px;
    background: var(--bg);
    cursor: pointer;
    text-align: center;
    transition: all 0.2s ease;
  }
  .file-dropzone:hover {
    border-color: var(--teal);
    background: rgba(0, 179, 164, 0.02);
  }
  .file-dropzone input[type=file] {
    position: absolute;
    width: 100%;
    height: 100%;
    top: 0;
    left: 0;
    opacity: 0;
    cursor: pointer;
  }
  .file-icon {
    font-size: 1.6rem;
    margin-bottom: 6px;
    color: var(--navy-soft);
  }
  .file-text { font-size: 0.9rem; font-weight: 500; color: var(--navy); }
  .file-subtext { font-size: 0.75rem; color: var(--navy-soft); margin-top: 2px; }
  
  .file-dropzone.has-file {
    border-style: solid;
    border-color: var(--teal);
    background: rgba(0, 179, 164, 0.06);
  }

  /* --- VISIBILITY CONTROL PANELS --- */
  .method-panel { display: none; }
  .method-panel.active { display: block; }

  .radio-row{ display:flex; gap:16px; margin-top:4px; }
  .radio-opt{
    display:flex; align-items:center; gap:8px;
    border:1.5px solid var(--line); border-radius:10px;
    padding:10px 16px; cursor:pointer; font-size:0.92rem;
    flex:1; background:var(--bg);
  }
  .radio-opt input{ accent-color:var(--orange); }
  .radio-opt:has(input:checked){ border-color:var(--orange); background:rgba(255,107,53,0.06); }

  .submit-btn{
    width:100%; margin-top:6px;
    background:var(--orange); color:#fff; border:none;
    font-weight:600; font-size:1rem; padding:15px; border-radius:10px;
    cursor:pointer; box-shadow:0 6px 18px rgba(255,107,53,0.28);
  }
  .submit-btn:disabled{ opacity:0.6; cursor:not-allowed; }

  .status{
    margin-top:16px; font-size:0.9rem; text-align:center;
    padding:12px; border-radius:10px; display:none;
  }
  .status.show{ display:block; }
  .status.ok{ background:rgba(0,179,164,0.1); color:#00857A; border:1px solid rgba(0,179,164,0.3); }
  .status.err{ background:rgba(255,107,53,0.1); color:#C1441E; border:1px solid rgba(255,107,53,0.3); }

  footer{
    border-top:1px solid var(--line); padding:28px 24px;
    text-align:center; font-size:0.85rem; color:var(--navy-soft);
  }
</style>
</head>
<body>

  <nav class="nav">
    <div class="brand"><span class="dot"></span> Octobrain</div>
    <a class="back-link" href="index.html">&larr; Back to posting</a>
  </nav>

  <main class="wrap">
    <div class="form-header">
      <div class="role-badge"><span class="role-dot"></span> Applying for: <strong>Robotics Trainer</strong></div>
      <h1>Apply now</h1>
      <p>Fill in your details below. It takes less than two minutes, and we'll follow up by phone or email.</p>
    </div>

    <form id="applyForm">
      <div class="field">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" required>
      </div>

      <div class="field">
        <label for="studentId">Student ID</label>
        <input type="text" id="studentId" name="studentId" required>
      </div>

      <div class="field">
        <label for="semester">Current semester</label>
        <input type="text" id="semester" name="semester" placeholder="e.g. 6th" required>
      </div>

      <div class="field">
        <label for="dept">Department</label>
        <input type="text" id="dept" name="dept" required>
      </div>

      <div class="field">
        <label>How would you like to provide your CV? <span class="opt">(Optional)</span></label>
        
        <div class="method-selector">
          <button type="button" class="method-btn active" id="btnUpload">📄 Upload PDF File</button>
          <button type="button" class="method-btn" id="btnLink">🔗 Paste Google Drive Link</button>
        </div>

        <div class="method-panel active" id="panelUpload">
          <div class="file-dropzone" id="dropzone">
            <div class="file-icon" id="mainIcon">📄</div>
            <div class="file-text" id="fileText">Click or drag file here to upload</div>
            <div class="file-subtext">PDF format up to 10MB</div>
            <input type="file" id="cvFile" accept="application/pdf">
          </div>
        </div>

        <div class="method-panel" id="panelLink">
          <input type="url" id="cvLink" placeholder="https://drive.google.com/...">
        </div>
      </div>

      <div class="field">
        <label>Gender</label>
        <div class="radio-row">
          <label class="radio-opt"><input type="radio" name="gender" value="Male" required> Male</label>
          <label class="radio-opt"><input type="radio" name="gender" value="Female" required> Female</label>
        </div>
      </div>

      <div class="field">
        <label for="comments">Comments <span class="opt">(optional)</span></label>
        <textarea id="comments" name="comments" placeholder="Anything else you'd like us to know"></textarea>
      </div>

      <button type="submit" class="submit-btn" id="submitBtn">Submit application</button>
      <div class="status" id="status"></div>
    </form>
  </main>

  <footer>
    Octobrain · Robotics Trainer (Part-Time) · Banani 24, Dhaka
  </footer>

<script>
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxqJ5sxZ7l-5Vn5DybBRb6uwLZhCuaeDqCwR0V7cmNr/dev";

  const form = document.getElementById('applyForm');
  const btn = document.getElementById('submitBtn');
  const status = document.getElementById('status');
  
  // Toggles and panels
  const btnUpload = document.getElementById('btnUpload');
  const btnLink = document.getElementById('btnLink');
  const panelUpload = document.getElementById('panelUpload');
  const panelLink = document.getElementById('panelLink');

  // Interactive UI Input Targets
  const cvFileInput = document.getElementById('cvFile');
  const cvLinkInput = document.getElementById('cvLink');
  
  // Graphical dropzone targets
  const dropzone = document.getElementById('dropzone');
  const fileText = document.getElementById('fileText');
  const mainIcon = document.getElementById('mainIcon');

  let currentMethod = "file"; 

  // Switch display state to File Upload mode
  btnUpload.addEventListener('click', () => {
    currentMethod = "file";
    btnUpload.classList.add('active');
    btnLink.classList.remove('active');
    panelUpload.classList.add('active');
    panelLink.classList.remove('active');
    cvLinkInput.value = ""; 
  });

  // Switch display state to Link Input mode
  btnLink.addEventListener('click', () => {
    currentMethod = "link";
    btnLink.classList.add('active');
    btnUpload.classList.remove('active');
    panelLink.classList.add('active');
    panelUpload.classList.remove('active');
    
    cvFileInput.value = "";
    dropzone.classList.remove('has-file');
    mainIcon.textContent = "📄";
    fileText.textContent = "Click or drag file here to upload";
  });

  // Listen for direct file updates and change text UI cues accordingly
  cvFileInput.addEventListener('change', () => {
    if (cvFileInput.files.length > 0) {
      const file = cvFileInput.files[0];
      dropzone.classList.add('has-file');
      mainIcon.textContent = "📎";
      fileText.textContent = `${file.name} (${(file.size / (1024 * 1024)).toFixed(2)} MB)`;
    } else {
      dropzone.classList.remove('has-file');
      mainIcon.textContent = "📄";
      fileText.textContent = "Click or drag file here to upload";
    }
  });

  form.addEventListener('submit', async (e) => {
    e.preventDefault();

    btn.disabled = true;
    btn.textContent = "Submitting...";
    status.className = "status";

    const formData = new FormData(form);
    const urlParams = new URLSearchParams();

    // Loop through normal key-value pairs (Name, ID, Semester, Dept, Gender, Comments)
    for (const [key, value] of formData.entries()) {
      urlParams.append(key, value);
    }

    // Async block reader to safely parse physical files into Base64 parameter streams
    const toBase64 = file => new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.readAsDataURL(file);
      reader.onload = () => resolve(reader.result.split(',')[1]);
      reader.onerror = error => reject(error);
    });

    try {
      if (currentMethod === "file" && cvFileInput.files.length > 0) {
        // Mode A: File Upload processing
        const file = cvFileInput.files[0];
        const base64Data = await toBase64(file);
        urlParams.append('fileData', base64Data);
        urlParams.append('fileName', `${formData.get('name') || 'Applicant'}_CV.pdf`);
        urlParams.append('fileMimeType', file.type);
      } else if (currentMethod === "link" && cvLinkInput.value.trim() !== "") {
        // Mode B: Paste Drive Link processing
        urlParams.append('pastedLink', cvLinkInput.value.trim());
      }

      // Fire payload to your live script URL using application/x-www-form-urlencoded format
      await fetch(SCRIPT_URL, {
        method: "POST",
        mode: "no-cors",
        headers: {
          "Content-Type": "application/x-www-form-urlencoded"
        },
        body: urlParams.toString()
      });

      status.textContent = "Application submitted! We'll be in touch soon.";
      status.className = "status show ok";
      
      // Clean and reset the interface back to blank initial state
      form.reset();
      cvFileInput.value = "";
      cvLinkInput.value = "";
      dropzone.classList.remove('has-file');
      mainIcon.textContent = "📄";
      fileText.textContent = "Click or drag file here to upload";
      btnUpload.click(); 
      
    } catch (err) {
      status.textContent = "Something went wrong. Please try again.";
      status.className = "status show err";
    } finally {
      btn.disabled = false;
      btn.textContent = "Submit application";
    }
  });
</script>

</body>
</html>
